name: uad
description: "UniPortal ADU - Sistema Académico UNAD"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.6.1
  # Navigation
  go_router: ^14.8.1
  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  # Icons (Lucide)
  lucide_icons: ^0.257.0
  # Utils
  intl: ^0.19.0
  pdf: ^3.12.0
  printing: ^5.14.3
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logos/


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon_ios.png"
  min_sdk_android: 21
  
  
  adaptive_icon_background: "#026A45"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"